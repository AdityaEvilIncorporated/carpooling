services:
  - type: web
    name: carpooling
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "carpooling.onrender.com,mycarpooling.com,www.mycarpooling.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://carpooling.onrender.com,https://mycarpooling.com,https://www.mycarpooling.com"
      - key: DATABASE_URL
        fromDatabase:
          name: carpooling-db
          property: connectionString
      - key: FARE_UNIT_PRICE
        value: "5.0"
      - key: FARE_BASE_FEE
        value: "2.0"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@mycarpooling.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
    buildCommand: ""
    startCommand: >
      sh -c "python manage.py migrate &&
             python manage.py createsuperuser --noinput || true &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120"

databases:
  - name: carpooling-db
    databaseName: carpooling
    user: carpooling_user
    plan: free
