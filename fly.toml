app = "carpooling-aditya"
primary_region = "sin"  # Singapore — closest to India

[build]

[env]
  PORT = "8080"
  DEBUG = "False"
  DOMAIN = "adityaevilincorporated.me"
  ALLOWED_HOSTS = "adityaevilincorporated.me,carpooling-aditya.fly.dev"
  CSRF_TRUSTED_ORIGINS = "https://adityaevilincorporated.me,https://carpooling-aditya.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
