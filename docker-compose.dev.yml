version: '3.9'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=carpooling_dev
      - POSTGRES_USER=carpooling_user
      - POSTGRES_PASSWORD=devpassword123
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_NAME=carpooling_dev
      - DB_USER=carpooling_user
      - DB_PASSWORD=devpassword123
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=dev-secret-key-not-for-production
    depends_on:
      - db

volumes:
  postgres_data_dev:
